<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-label="Test error decomposed into bias squared, variance, and irreducible noise as model complexity grows.">
  <rect width="900" height="420" fill="#ffffff"/>

  <!-- title -->
  <text x="60" y="56" font-family="ui-serif, Georgia, serif" font-size="22" font-weight="600" fill="#15161a">The bias–variance trade-off</text>
  <text x="60" y="78" font-family="ui-sans-serif, system-ui" font-size="13" fill="#6b6d72">Test error as the sum of squared bias, variance, and an irreducible-noise floor.</text>

  <!-- axes -->
  <g stroke="#d8d6d0" stroke-width="1">
    <line x1="80" y1="360" x2="840" y2="360"/>
    <line x1="80" y1="120" x2="80" y2="360"/>
  </g>
  <text x="450" y="395" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" fill="#6b6d72">Model complexity →</text>
  <text x="44" y="240" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" fill="#6b6d72" transform="rotate(-90 44 240)">Expected loss</text>

  <!-- bias² (decreasing) -->
  <path d="M100 150 C 240 210, 360 290, 600 330 S 820 350, 820 352" fill="none" stroke="#2c5cc5" stroke-width="2.2"/>
  <text x="120" y="142" font-family="ui-sans-serif, system-ui" font-size="13" fill="#2c5cc5" font-weight="600">bias²</text>

  <!-- variance (increasing) -->
  <path d="M100 352 C 280 348, 420 320, 560 260 S 760 150, 820 130" fill="none" stroke="#9c4a1a" stroke-width="2.2"/>
  <text x="775" y="120" font-family="ui-sans-serif, system-ui" font-size="13" fill="#9c4a1a" font-weight="600">variance</text>

  <!-- irreducible noise (constant) -->
  <line x1="100" y1="320" x2="840" y2="320" stroke="#6b6d72" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="700" y="313" font-family="ui-sans-serif, system-ui" font-size="12" fill="#6b6d72">σ²  (irreducible)</text>

  <!-- total test error (U-shape, sum) -->
  <path d="M100 200 C 200 180, 320 175, 420 198 S 620 240, 720 260 820 280, 840 290" fill="none" stroke="#15161a" stroke-width="2.6"/>
  <text x="240" y="170" font-family="ui-sans-serif, system-ui" font-size="13" fill="#15161a" font-weight="700">test error</text>

  <!-- sweet-spot marker -->
  <g>
    <circle cx="380" cy="178" r="5" fill="#15161a"/>
    <line x1="380" y1="178" x2="380" y2="360" stroke="#15161a" stroke-width="0.8" stroke-dasharray="2 3"/>
    <text x="388" y="174" font-family="ui-sans-serif, system-ui" font-size="12" fill="#15161a">optimal complexity</text>
  </g>
</svg>
